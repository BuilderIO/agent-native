name: Content E2EE assurance

on:
  push:
    branches: [codex/content-e2ee-foundation]
  pull_request:
    branches: [main, codex/content-e2ee-foundation]
    paths:
      - ".github/workflows/content-e2ee-assurance.yml"
      - ".github/actions/restore-dist-cache/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "packages/core/package.json"
      - "packages/core/src/e2ee/**"
      - "packages/private-vault-broker/package.json"
      - "packages/private-vault-broker/**"
      - "packages/desktop-app/package.json"
      - "packages/desktop-app/native/private-vault-*/**"
      - "packages/desktop-app/native/build-private-vault-*.sh"
      - "packages/desktop-app/scripts/*private-vault*"
      - "packages/desktop-app/src/main/private-vault/**"
      - "packages/desktop-app/src/main/ipc/content-private-*.ts"
      - "packages/desktop-app/src/preload/**"
      - "packages/desktop-app/src/renderer/components/PrivateContentSurface*"
      - "templates/content/actions/*private-vault*"
      - "templates/content/package.json"
      - "templates/content/server/**/*private-vault*"
      - "templates/content/shared/*private-vault*"
  workflow_dispatch:

concurrency:
  group: content-e2ee-assurance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  portable-adversarial:
    name: Portable contracts and adversarial paths
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Restore workspace build cache
        uses: ./.github/actions/restore-dist-cache

      - run: pnpm install --frozen-lockfile

      - name: Run frozen protocol and hostile-vector corpus
        run: pnpm --filter @agent-native/core exec vitest run src/e2ee

      - name: Run reusable broker denial and retry corpus
        run: pnpm --filter @agent-native/private-vault-broker test

      - name: Run hosted opaque-plane and privacy tests
        run: pnpm --filter content exec vitest run private-vault

      - name: Run signed Desktop private-runtime tests
        run: >-
          pnpm --filter @agent-native/desktop-app exec vitest run
          src/main/private-vault
          src/main/ipc/content-private-vault.test.ts
          src/main/ipc/content-private-runtime.test.ts
          src/main/privacy-regressions.test.ts
          src/renderer/components/PrivateContentSurface.test.tsx
          --exclude src/main/private-vault/native-service-client.test.ts

      - name: Typecheck protected runtime packages
        run: >-
          pnpm --filter @agent-native/core typecheck &&
          pnpm --filter @agent-native/private-vault-broker typecheck &&
          pnpm --filter @agent-native/desktop-app typecheck &&
          pnpm --filter content typecheck

  native-trust-anchor:
    name: Universal native trust anchor
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run signed release packaging boundary tests
        run: pnpm --filter @agent-native/desktop-app test:private-vault-packaging

      - name: Build universal production service and signed-client addon
        run: |
          packages/desktop-app/native/build-private-vault-service.sh
          packages/desktop-app/native/build-private-vault-xpc-client.sh
          lipo packages/desktop-app/native/private-vault-service/build/com.agentnative.desktop.private-vault-service.xpc/Contents/MacOS/AgentNativePrivateVaultService -verify_arch arm64 x86_64
          lipo packages/desktop-app/native/private-vault-xpc-client/build/private-vault-xpc-client.node -verify_arch arm64 x86_64

      - name: Run signed native-client boundary tests
        run: >-
          pnpm --filter @agent-native/desktop-app exec vitest run
          src/main/private-vault/native-service-client.test.ts

      - name: Run native request framing and recovery archive protocols
        run: |
          packages/desktop-app/native/private-vault-service/run-protocol-tests.sh
          packages/desktop-app/native/private-vault-service/run-export-archive-tests.sh

      - name: Build focused native hostile corpus
        env:
          PRIVATE_VAULT_BUILD_ARCHITECTURES: universal
          PRIVATE_VAULT_BUILD_CRYPTO_TESTS: "1"
          PRIVATE_VAULT_BUILD_CANONICAL_TESTS: "1"
          PRIVATE_VAULT_BUILD_JOB_CODEC_TESTS: "1"
          PRIVATE_VAULT_BUILD_GRANT_CODEC_TESTS: "1"
          PRIVATE_VAULT_BUILD_GRANT_REVOCATION_BUILDER_TESTS: "1"
          PRIVATE_VAULT_BUILD_GRANT_INDEX_TESTS: "1"
          PRIVATE_VAULT_BUILD_ENDPOINT_REQUEST_TESTS: "1"
          PRIVATE_VAULT_BUILD_CONTROL_LOG_TESTS: "1"
          PRIVATE_VAULT_BUILD_OBJECT_REVISION_TESTS: "1"
          PRIVATE_VAULT_BUILD_EXPORT_ARCHIVE_TESTS: "1"
        run: packages/desktop-app/native/build-private-vault-service.sh

      - name: Execute native corpus for the runner architecture
        shell: bash
        run: |
          set -euo pipefail
          architecture="$(uname -m)"
          build_root="packages/desktop-app/native/private-vault-service/build"
          export ANC_V1_CONTROL_LOG_FIXTURE_PATH="$PWD/packages/core/src/e2ee/fixtures/anc-v1-native-control-log-vectors.json"
          export ANC_V1_CONTROL_LOG_SOURCE_ROOT="$PWD"
          test_binaries=(
            "$build_root/.crypto-tests/private-vault-crypto-tests-$architecture"
            "$build_root/.canonical-tests/private-vault-canonical-tests-$architecture"
            "$build_root/.job-codec-tests/private-vault-job-codec-tests-$architecture"
            "$build_root/.grant-codec-tests/private-vault-grant-codec-tests-$architecture"
            "$build_root/.grant-revocation-builder-tests/private-vault-grant-revocation-builder-tests-$architecture"
            "$build_root/.grant-index-tests/private-vault-grant-index-tests-$architecture"
            "$build_root/.endpoint-request-tests/private-vault-endpoint-request-tests-$architecture"
            "$build_root/.control-log-tests/private-vault-control-log-tests-$architecture"
            "$build_root/.object-revision-tests/private-vault-object-revision-tests-$architecture"
            "$build_root/.export-archive-tests/private-vault-export-archive-tests-$architecture"
          )
          for test_binary in "${test_binaries[@]}"; do
            if [ ! -x "$test_binary" ]; then
              echo "Missing native assurance executable: $test_binary" >&2
              exit 1
            fi
            "$test_binary"
          done

      - name: Verify Desktop packaging contract
        run: pnpm --filter @agent-native/desktop-app test:private-vault-packaging
