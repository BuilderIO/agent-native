name: PR Visual Recap

# Turns every PR into a "visual code review" — a reverse plan — by letting a real
# coding agent RUN THE REPO'S visual-recap SKILL against the diff. The agent
# (Claude Code by default, or Codex) reads the skill, reasons over the change,
# publishes an Agent-Native Plan via the plan MCP tools, and writes the plan URL
# to recap-url.txt. The workflow then screenshots that plan in headless Chrome,
# uploads the PNG to the plan app's signed public image route, and upserts ONE
# sticky PR comment with the inline screenshot + the interactive link.
#
# Design notes:
#  - Plain `pull_request` (NOT `pull_request_target`) so fork code can never see
#    the publish/agent secrets. Fork PRs are a silent no-op.
#  - The `gate` job is a cheap switch: drafts, forks, bot authors, and the
#    missing-secret case short-circuit with NO comment and NO compute. Merging
#    this workflow before the secrets exist is a safe no-op.
#  - The recap is INFORMATIONAL ONLY. It is not a required check and failures
#    surface as an explanatory sticky comment, never a red X on unrelated code.
#  - Backend is selectable with the `VISUAL_RECAP_AGENT` repo variable
#    (claude | codex; default claude). Model and reasoning depth are tunable with
#    `VISUAL_RECAP_MODEL` (e.g. gpt-5.5) and `VISUAL_RECAP_REASONING`
#    (none|minimal|low|medium|high|xhigh; Codex only). The CLI invocation is
#    auto-detected: local source inside this monorepo, the published
#    @agent-native/core elsewhere — no repo variable needed.
#  - Only two secrets are required: PLAN_RECAP_TOKEN (publish) and the chosen
#    backend's API key. PLAN_RECAP_APP_URL defaults to the hosted plan app.
#  - Nothing here is deterministic: the skill's instructions drive the recap.

on:
  # Run on PRs into any base branch — the generated workflow ships to repos whose
  # default branch may not be `main`. The gate job below still no-ops drafts,
  # forks, bots, and the missing-secret case, so this stays cheap.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Least privilege by default: the workflow gets read-only `contents` and each
# job escalates only what it needs (gate reads PR files; recap writes the sticky
# comment). Avoids a broad write token sitting on the job that runs the agent.
permissions:
  contents: read

concurrency:
  group: pr-visual-recap-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  VISUAL_RECAP_AGENT: ${{ vars.VISUAL_RECAP_AGENT || 'claude' }}

jobs:
  # --------------------------------------------------------------------------
  # Cheap gate: decide whether to do any work at all. Sets run=false (silent
  # no-op) for drafts, forks, bot authors, or when the publish secret / the
  # chosen backend's API key is absent.
  # --------------------------------------------------------------------------
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only needs to read PR file metadata for the self-modifying guard.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
      agent: ${{ steps.decide.outputs.agent }}
    steps:
      - id: decide
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          # Presence-only signals — we never expose the secret VALUES to the gate.
          # PLAN_RECAP_APP_URL defaults to the hosted app, so only the token is required.
          HAS_PLAN: ${{ secrets.PLAN_RECAP_TOKEN != '' }}
          HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          HAS_OPENAI: ${{ secrets.OPENAI_API_KEY != '' }}
          AGENT: ${{ env.VISUAL_RECAP_AGENT }}
          VISUAL_RECAP_MODEL: ${{ vars.VISUAL_RECAP_MODEL }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const reasons = [];

            if (!pr) reasons.push('no pull_request payload');
            if (pr && pr.draft) reasons.push('draft PR');

            // Fork PRs: head repo differs from this repo. Plain pull_request runs
            // fork code with NO secrets, so publishing would fail anyway — skip.
            const headRepo = pr && pr.head && pr.head.repo && pr.head.repo.full_name;
            if (pr && headRepo && headRepo !== process.env.GITHUB_REPOSITORY) {
              reasons.push(`fork PR (${headRepo})`);
            }

            // Skip noisy automated authors.
            const login = (pr && pr.user && pr.user.login || '').toLowerCase();
            const botAuthors = ['dependabot[bot]', 'dependabot', 'renovate[bot]', 'renovate'];
            if (botAuthors.includes(login)) reasons.push(`bot author (${login})`);
            if (pr && pr.user && pr.user.type === 'Bot') reasons.push('bot author (type=Bot)');

            // Publish secret must be configured — otherwise this is a no-op so the
            // workflow can be merged before secrets exist.
            if (process.env.HAS_PLAN !== 'true') reasons.push('PLAN_RECAP_TOKEN not configured');

            // The chosen backend's API key must be present. Normalize the agent
            // value once here and validate it: an unknown or mis-cased value
            // (e.g. "Claude", "gpt") must NOT silently pass the gate and then
            // match neither agent step below.
            const agent = (process.env.AGENT || 'claude').toLowerCase();
            if (agent !== 'claude' && agent !== 'codex') {
              reasons.push(`unsupported VISUAL_RECAP_AGENT "${process.env.AGENT}" (expected "claude" or "codex")`);
            } else if (agent === 'codex') {
              if (process.env.HAS_OPENAI !== 'true') reasons.push('OPENAI_API_KEY not configured (codex backend)');
            } else {
              if (process.env.HAS_ANTHROPIC !== 'true') reasons.push('ANTHROPIC_API_KEY not configured (claude backend)');
            }

            // Validate VISUAL_RECAP_MODEL if set — an unchecked value could be injected
            // by a repo settings writer and passed straight to the agent CLI.
            const model = process.env.VISUAL_RECAP_MODEL || '';
            if (model && !/^[a-zA-Z0-9._-]{1,80}$/.test(model)) {
              reasons.push(`invalid VISUAL_RECAP_MODEL value (must match [a-zA-Z0-9._-]{1,80})`);
            }

            // Self-modifying guard, evaluated in the GATE (trusted github-script
            // that runs NO PR-checked-out code): if this PR changes the workflow,
            // the visual-recap/visual-plan skill, the local CLI (packages/core),
            // or any agent config the runner would load (.claude/**, CLAUDE.md,
            // .mcp.json), skip the ENTIRE job — not just the agent — so a PR can
            // never rewrite what runs (skill, hooks, settings, CLI) and exfiltrate
            // the publish/API secrets.
            if (pr) {
              try {
                const files = await github.paginate(github.rest.pulls.listFiles, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  per_page: 100,
                });
                const isSensitive = (p) =>
                  p === '.github/workflows/pr-visual-recap.yml' ||
                  /(^|\/)skills\/visual-(recap|plan|plans)\//.test(p) ||
                  /(^|\/)\.claude\//.test(p) ||
                  /(^|\/)CLAUDE\.md$/.test(p) ||
                  /(^|\/)AGENTS\.md$/.test(p) ||
                  /(^|\/)\.mcp\.json$/.test(p) ||
                  /(^|\/)packages\/core\//.test(p);
                const hits = files.map((f) => f.filename).filter(isSensitive);
                if (hits.length) {
                  reasons.push(`PR modifies recap-control files (${hits.slice(0, 3).join(', ')}${hits.length > 3 ? ', …' : ''}) — skipping so untrusted PR code never runs with secrets`);
                }
              } catch (e) {
                reasons.push(`could not list PR files for the self-modifying guard (${e.message}); skipping to be safe`);
              }
            }

            const run = reasons.length === 0;
            core.setOutput('run', run ? 'true' : 'false');
            // Export the NORMALIZED agent so the recap job's step conditions match
            // case-insensitively via needs.gate.outputs.agent.
            core.setOutput('agent', agent);
            core.info(run ? `Visual recap will run (${agent}).` : `Visual recap skipped: ${reasons.join('; ')}`);

  # --------------------------------------------------------------------------
  # Recap: collect the diff, let the agent run the skill + publish, screenshot
  # the result, and upsert the sticky comment.
  # --------------------------------------------------------------------------
  recap:
    name: Generate visual recap
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    # The agent run + headless-Chrome screenshot dominate; cap so a hung agent
    # or browser can't burn a full 6h runner.
    timeout-minutes: 30
    # Escalate only here: write the sticky PR comment (issues+pull-requests),
    # read the checked-out source (contents). The agent step that runs untrusted
    # PR diff content gets no more than this.
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      PLAN_RECAP_APP_URL: ${{ secrets.PLAN_RECAP_APP_URL || 'https://plan.agent-native.com' }}
      PLAN_RECAP_TOKEN: ${{ secrets.PLAN_RECAP_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      VISUAL_RECAP_MODEL: ${{ vars.VISUAL_RECAP_MODEL }}
      VISUAL_RECAP_REASONING: ${{ vars.VISUAL_RECAP_REASONING }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          # Don't leave the job's GITHUB_TOKEN in .git/config — this job runs an
          # agent over untrusted PR diff content, and it talks to GitHub via the
          # GH_TOKEN env for gh API calls, never via git push. Hardening only.
          persist-credentials: false

      # Resolve the CLI invocation once: dogfood local source inside this
      # monorepo, otherwise the published package. No repo variable needed. The
      # pnpm setup/install steps below run ONLY for the local-source path, so the
      # generated workflow works out-of-box in npm/yarn consumer repos (which
      # have no pnpm-lock.yaml) by falling back to `npx @agent-native/core`.
      - name: Resolve recap CLI
        id: cli
        run: |
          if [ -f packages/core/src/cli/index.ts ]; then
            echo "RECAP_CLI=pnpm exec tsx packages/core/src/cli/index.ts" >> "$GITHUB_ENV"
            echo "local=true" >> "$GITHUB_OUTPUT"
          else
            echo "RECAP_CLI=npx -y @agent-native/core@latest" >> "$GITHUB_ENV"
            echo "local=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        if: steps.cli.outputs.local == 'true'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: ${{ steps.cli.outputs.local == 'true' && 'pnpm' || '' }}

      - name: Install workspace (local source only)
        if: steps.cli.outputs.local == 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Collect a BOUNDED diff between the PR base and head. The CLI excludes
      # lockfiles, build output, and snapshots (noise), caps the byte size at
      # ~600KB (over the cap it truncates recap.diff at a line boundary and sets
      # `huge=true` so the agent is told to summarize), and classifies `tiny`.
      # The CLI writes the bytes/changed/huge/tiny outputs to $GITHUB_OUTPUT
      # itself — see `recap collect-diff` in packages/core/src/cli/recap.ts.
      - name: Collect bounded diff
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          $RECAP_CLI recap collect-diff --base "$BASE_SHA" --head "$HEAD_SHA" --out recap.diff --stat recap.stat

      # Secret pre-scan: refuse to hand a diff that looks like it leaks
      # credentials to the agent. Prints { suppressed, reason } and always exits 0.
      - name: Secret scan
        id: scan
        if: steps.diff.outputs.tiny != 'true'
        run: |
          set -uo pipefail
          # Fail CLOSED: if the scanner errors or emits invalid JSON, treat the
          # diff as suppressed, so a scan failure can never hand a possibly
          # credential-bearing diff to the agent / plan service.
          if ! SCAN_JSON="$($RECAP_CLI recap scan --diff recap.diff)"; then
            SCAN_JSON='{"suppressed":true,"reason":"secret scan failed to run; failing closed"}'
          fi
          # Multi-line-safe write: SCAN_JSON could contain newlines, which would
          # otherwise corrupt $GITHUB_OUTPUT or inject extra keys.
          {
            echo 'json<<__RECAP_SCAN_EOF__'
            echo "$SCAN_JSON"
            echo '__RECAP_SCAN_EOF__'
          } >> "$GITHUB_OUTPUT"
          SUPPRESSED=$(node -e 'try{process.stdout.write(JSON.parse(process.argv[1]).suppressed?"true":"false")}catch{process.stdout.write("true")}' "$SCAN_JSON")
          echo "suppressed=$SUPPRESSED" >> "$GITHUB_OUTPUT"

      # Find the planId from the previous sticky comment so a re-push REPLACES the
      # same hosted plan (synchronize updates in place, no orphaned plans).
      - name: Read previous plan id
        id: prev
        continue-on-error: true
        run: |
          set -euo pipefail
          PLAN_ID="$($RECAP_CLI recap comment find-plan-id --repo "$GITHUB_REPOSITORY" --issue "$PR_NUMBER" --token "$GH_TOKEN")"
          echo "plan_id=$PLAN_ID" >> "$GITHUB_OUTPUT"

      # Build the agent prompt = the repo's visual-recap SKILL.md + a task wrapper.
      - name: Build recap prompt
        id: prompt
        if: steps.diff.outputs.tiny != 'true' && steps.scan.outputs.suppressed != 'true'
        env:
          # Pass step outputs through env, NOT via ${{ }} interpolation into the
          # run body: the plan id is parsed from a PR sticky comment, so a crafted
          # value interpolated into the script text could break quoting and run
          # arbitrary shell on the runner that holds the publish/API secrets.
          # As env vars they are inert data; args are assembled in a bash array
          # so each is passed as a single quoted token.
          PREV_PLAN_ID: ${{ steps.prev.outputs.plan_id }}
          DIFF_HUGE: ${{ steps.diff.outputs.huge }}
        run: |
          set -euo pipefail
          ARGS=(--diff recap.diff --stat recap.stat --pr "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --head "$HEAD_SHA" --app-url "$PLAN_RECAP_APP_URL" --out recap-prompt.md)
          if [ "${DIFF_HUGE:-}" = "true" ]; then ARGS+=(--huge); fi
          if [ -n "${PREV_PLAN_ID:-}" ]; then ARGS+=(--prev-plan-id "$PREV_PLAN_ID"); fi
          $RECAP_CLI recap build-prompt "${ARGS[@]}"

      # Wire the plan MCP server for the chosen backend, then run the agent. The
      # agent follows the skill, calls create-visual-recap + set-resource-visibility,
      # and writes the published plan URL to recap-url.txt. continue-on-error so a
      # failed agent run becomes an explanatory comment, not a red X.
      - name: Run agent (Claude Code)
        id: claude
        if: needs.gate.outputs.agent == 'claude' && steps.diff.outputs.tiny != 'true' && steps.scan.outputs.suppressed != 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -uo pipefail
          MCP_CONFIG="$RUNNER_TEMP/plan-mcp.json"
          # Write the plan MCP config (reads PLAN_RECAP_TOKEN from env) — see
          # `recap mcp-config` in packages/core/src/cli/recap.ts.
          $RECAP_CLI recap mcp-config --agent claude --app-url "$PLAN_RECAP_APP_URL" --out "$MCP_CONFIG"
          # VISUAL_RECAP_MODEL picks the Claude model; reasoning depth is model-driven
          # for Claude Code, so VISUAL_RECAP_REASONING only applies to the Codex backend.
          CLAUDE_ARGS=(-p "$(cat recap-prompt.md)" --mcp-config "$MCP_CONFIG" --allowedTools "Read,Write,Bash(git diff:*),mcp__plan__create-visual-recap,mcp__plan__set-resource-visibility" --permission-mode dontAsk --output-format json)
          if [ -n "${VISUAL_RECAP_MODEL:-}" ]; then CLAUDE_ARGS+=(--model "$VISUAL_RECAP_MODEL"); fi
          # Capture the final JSON result (usage + total_cost_usd) for the usage step.
          npx -y @anthropic-ai/claude-code@2 "${CLAUDE_ARGS[@]}" > claude-result.json || true
          rm -f "$MCP_CONFIG" || true

      - name: Run agent (Codex)
        id: codex
        if: needs.gate.outputs.agent == 'codex' && steps.diff.outputs.tiny != 'true' && steps.scan.outputs.suppressed != 'true'
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -uo pipefail
          # Write ~/.codex/config.toml with the plan MCP server. The CLI
          # JSON.stringifies the URL value so a stray quote/newline in
          # PLAN_RECAP_APP_URL can't break out of the TOML string, and creates
          # the ~/.codex dir — see `recap mcp-config` in
          # packages/core/src/cli/recap.ts.
          $RECAP_CLI recap mcp-config --agent codex --app-url "$PLAN_RECAP_APP_URL"
          # Authenticate with the API key explicitly. Relying on the bare
          # OPENAI_API_KEY env var alone is unreliable on the gpt-5.5 WebSocket
          # transport: the Authorization header is dropped on the wss path and
          # its HTTPS fallback, surfacing as `401 Missing bearer or basic
          # authentication in header` (openai/codex#15492). `codex login
          # --with-api-key` reads the key from stdin and writes ~/.codex/auth.json,
          # which the exec path reads reliably; piping via stdin keeps the key out
          # of the process args. Non-fatal so a login hiccup still yields the
          # explanatory recap comment rather than a red X.
          printenv OPENAI_API_KEY | npx -y @openai/codex@0 login --with-api-key || true
          # VISUAL_RECAP_MODEL (e.g. gpt-5.5) and VISUAL_RECAP_REASONING
          # (none|minimal|low|medium|high|xhigh) tune the Codex run.
          #
          # The GitHub runner is itself an ephemeral, throwaway sandbox, so run
          # Codex with sandboxing and approvals disabled. Codex's own bubblewrap
          # sandbox cannot initialize on the runner ("could not find bubblewrap
          # on PATH"), which makes every shell command fail at startup so the
          # agent cannot even read recap.diff; and under an approval gate the
          # write-side plan MCP call (create-visual-recap) is auto-cancelled
          # ("user cancelled MCP tool call"). --dangerously-bypass-approvals-and-sandbox
          # is the documented invocation for externally-sandboxed CI and clears both.
          CODEX_ARGS=(exec --dangerously-bypass-approvals-and-sandbox --skip-git-repo-check)
          if [ -n "${VISUAL_RECAP_MODEL:-}" ]; then CODEX_ARGS+=(--model "$VISUAL_RECAP_MODEL"); fi
          # Validate reasoning against the known enum before embedding it in the
          # codex `-c` TOML override, so an unexpected value can't alter the config.
          case "${VISUAL_RECAP_REASONING:-}" in
            none|minimal|low|medium|high|xhigh)
              CODEX_ARGS+=(-c "model_reasoning_effort=\"$VISUAL_RECAP_REASONING\"") ;;
            "") ;;
            *) echo "Ignoring invalid VISUAL_RECAP_REASONING: $VISUAL_RECAP_REASONING" ;;
          esac
          npx -y @openai/codex@0 "${CODEX_ARGS[@]}" --json "$(cat recap-prompt.md)" | tee codex-events.jsonl || true

      # The agent's only hand-off: recap-url.txt with the published plan URL.
      - name: Read plan URL
        id: url
        if: steps.diff.outputs.tiny != 'true' && steps.scan.outputs.suppressed != 'true'
        run: |
          set -uo pipefail
          PLAN_URL=""
          if [ -f recap-url.txt ]; then PLAN_URL="$(tr -d '\r\n' < recap-url.txt | tr -d ' ')"; fi
          echo "plan_url=$PLAN_URL" >> "$GITHUB_OUTPUT"
          if [ -n "$PLAN_URL" ]; then echo "ok=true" >> "$GITHUB_OUTPUT"; else echo "ok=false" >> "$GITHUB_OUTPUT"; fi

      # Capture the agent run token usage and attach it to the published recap
      # so the recap row carries input/output/cached tokens, the model, and a
      # cost estimate. Informational and best-effort: never fails the job.
      - name: Attach usage
        if: steps.url.outputs.ok == 'true'
        continue-on-error: true
        env:
          PLAN_URL: ${{ steps.url.outputs.plan_url }}
          # Use the gate-NORMALIZED agent (lowercased + validated), not the raw
          # VISUAL_RECAP_AGENT repo var, so a value like "Codex" still selects the
          # codex result file and labels usage on the right backend.
          RECAP_AGENT: ${{ needs.gate.outputs.agent }}
        run: |
          set -uo pipefail
          RESULT=claude-result.json
          if [ "$RECAP_AGENT" = "codex" ]; then RESULT=codex-events.jsonl; fi
          if [ -f "$RESULT" ]; then $RECAP_CLI recap usage --plan-url "$PLAN_URL" --agent "$RECAP_AGENT" --result-file "$RESULT" --model "${VISUAL_RECAP_MODEL:-}" --app-url "$PLAN_RECAP_APP_URL" --token "$PLAN_RECAP_TOKEN" || true; fi

      # Screenshot the published plan in headless Chrome and upload the PNG to the
      # plan app's signed public image route. Best-effort: never fails the job.
      - name: Screenshot + upload
        id: shot
        if: steps.url.outputs.ok == 'true'
        continue-on-error: true
        env:
          # Pass the agent-produced plan URL through the environment, never via
          # ${{ }} interpolation into the run script: recap-url.txt is untrusted
          # agent output, so inlining it would be a shell-injection vector.
          PLAN_URL: ${{ steps.url.outputs.plan_url }}
        run: |
          set -uo pipefail
          pnpm exec playwright install --with-deps chromium 2>/dev/null || npx -y playwright@1 install --with-deps chromium || true
          SHOT_JSON="$($RECAP_CLI recap shot --url "$PLAN_URL" --token "$PLAN_RECAP_TOKEN" --app-url "$PLAN_RECAP_APP_URL" --out recap.png || echo '{}')"
          IMAGE_URL=$(node -e 'try{process.stdout.write(JSON.parse(process.argv[1]).imageUrl||"")}catch{process.stdout.write("")}' "$SHOT_JSON")
          echo "image_url=$IMAGE_URL" >> "$GITHUB_OUTPUT"
          if [ -f recap.png ]; then echo "captured=true" >> "$GITHUB_OUTPUT"; else echo "captured=false" >> "$GITHUB_OUTPUT"; fi

      - name: Upload recap screenshot artifact
        if: steps.shot.outputs.captured == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-visual-recap-${{ github.event.pull_request.number }}
          path: recap.png
          if-no-files-found: ignore
          retention-days: 14

      # Upsert the single sticky comment: inline screenshot + link on success,
      # suppressed / failed / tiny variants otherwise. Runs even on a tiny diff
      # so a prior recap comment is refreshed (not left pointing at a stale SHA).
      - name: Upsert sticky comment
        if: always()
        # The recap is informational/non-blocking: a failed comment upsert must
        # not turn the whole job red (the agent + screenshot steps are already
        # continue-on-error).
        continue-on-error: true
        env:
          PLAN_URL: ${{ steps.url.outputs.plan_url }}
          RECAP_IMAGE_URL: ${{ steps.shot.outputs.image_url }}
          SUPPRESSED: ${{ steps.scan.outputs.suppressed }}
          SUPPRESSED_JSON: ${{ steps.scan.outputs.json }}
          DIFF_HUGE: ${{ steps.diff.outputs.huge }}
          DIFF_TINY: ${{ steps.diff.outputs.tiny }}
        run: |
          set -euo pipefail
          ARGS=(recap comment upsert --repo "$GITHUB_REPOSITORY" --issue "$PR_NUMBER" --token "$GH_TOKEN")
          # On a tiny diff, only REFRESH an existing recap comment — never create
          # a new one — so we add no noise but also can't leave a stale prior
          # recap behind.
          if [ "${DIFF_TINY:-}" = "true" ]; then ARGS+=(--update-only); fi
          $RECAP_CLI "${ARGS[@]}"
