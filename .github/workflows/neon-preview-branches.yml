name: Neon Preview Branches

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read

# Map each Netlify site to its Neon project. When a PR opens, we create a
# Neon branch per project and inject NETLIFY_DATABASE_URL_PR_<N> into the
# Netlify site environment. Each key is PR-scoped so concurrent PRs cannot
# overwrite each other. The framework runtime resolves the key using the
# REVIEW_ID variable that Netlify injects into both build and function
# environments for deploy previews.
#
# On PR close we delete only that PR's Neon branch and its own env keys.

env:
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

jobs:
  create-branches:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - template: analytics
            neon_project: dry-shadow-75673589
            netlify_site: ba983662-dac4-478d-a481-5079e67e4d33
          - template: brain
            neon_project: lingering-band-25891811
            netlify_site: af978d13-aa58-44f3-9b5c-f12568467079
          - template: calendar
            neon_project: super-fire-75593365
            netlify_site: 954fe53b-052e-4401-aac2-2e973e498af8
          - template: clips
            neon_project: aged-glitter-95425960
            netlify_site: 7e3f4fee-258d-4d16-9aaf-154a714e87e2
          - template: content
            neon_project: quiet-heart-51077706
            netlify_site: 5c2198f5-bee4-41c3-8a6d-4869f400eec2
          - template: forms
            neon_project: curly-glade-91979555
            netlify_site: aa0b2020-9983-4d6c-8fb0-65462f960fc4
          - template: mail
            neon_project: patient-cake-44789837
            netlify_site: dee98bb0-6143-4205-8c04-afe7bf83d5b5
          - template: plan
            neon_project: late-pine-39936033
            netlify_site: 9d0d7a73-385d-4da1-ba10-1581ffc4d413
          - template: slides
            neon_project: hidden-thunder-16834477
            netlify_site: fd5deb5b-5539-47e1-830c-e5fb5e105efd
    steps:
      - name: Create Neon branch
        uses: neondatabase/create-branch-action@fb620d43d4c565abaf088b848a4e28e5c4ea4d9c # v6
        id: neon
        with:
          project_id: ${{ matrix.neon_project }}
          branch_name: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Set preview DB URLs on Netlify site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NEON_DB_URL_POOLED: ${{ steps.neon.outputs.db_url_pooled }}
          NEON_DB_URL_UNPOOLED: ${{ steps.neon.outputs.db_url }}
        run: |
          PR="${{ github.event.number }}"
          SITE="${{ matrix.netlify_site }}"
          ACCT="${{ secrets.NETLIFY_ACCOUNT_ID }}"
          BASE="https://api.netlify.com/api/v1/accounts/$ACCT/env"
          AUTH="Authorization: Bearer $NETLIFY_AUTH_TOKEN"

          # Connection strings are credentials, so the generated vars are marked
          # is_secret. curl returns 000 for DNS/TLS/connectivity failures, so we
          # treat only an explicit 2xx as success — anything else (000 included)
          # fails the step rather than silently leaving the var unset.
          set_netlify_env() {
            local key="$1" val="$2"
            local body patch_body http
            body=$(jq -n --arg k "$key" --arg v "$val" \
              '[{"key":$k,"scopes":["builds","functions","runtime"],"is_secret":true,"values":[{"value":$v,"context":"deploy-preview"}]}]')
            patch_body=$(jq -n --arg v "$val" '{"value":$v,"context":"deploy-preview"}')

            http=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "$AUTH" -H "Content-Type: application/json" \
              "$BASE?site_id=$SITE" -d "$body")
            if [[ ! "$http" =~ ^2[0-9][0-9]$ ]]; then
              http=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
                -H "$AUTH" -H "Content-Type: application/json" \
                "$BASE/$key?site_id=$SITE" -d "$patch_body")
            fi
            if [[ ! "$http" =~ ^2[0-9][0-9]$ ]]; then
              echo "::error::Failed to set Netlify env $key for site $SITE (HTTP $http)"
              exit 1
            fi
          }

          set_netlify_env "NETLIFY_DATABASE_URL_PR_${PR}" "$NEON_DB_URL_POOLED"
          set_netlify_env "NETLIFY_DATABASE_URL_UNPOOLED_PR_${PR}" "$NEON_DB_URL_UNPOOLED"

  delete-branches:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - template: analytics
            neon_project: dry-shadow-75673589
            netlify_site: ba983662-dac4-478d-a481-5079e67e4d33
          - template: brain
            neon_project: lingering-band-25891811
            netlify_site: af978d13-aa58-44f3-9b5c-f12568467079
          - template: calendar
            neon_project: super-fire-75593365
            netlify_site: 954fe53b-052e-4401-aac2-2e973e498af8
          - template: clips
            neon_project: aged-glitter-95425960
            netlify_site: 7e3f4fee-258d-4d16-9aaf-154a714e87e2
          - template: content
            neon_project: quiet-heart-51077706
            netlify_site: 5c2198f5-bee4-41c3-8a6d-4869f400eec2
          - template: forms
            neon_project: curly-glade-91979555
            netlify_site: aa0b2020-9983-4d6c-8fb0-65462f960fc4
          - template: mail
            neon_project: patient-cake-44789837
            netlify_site: dee98bb0-6143-4205-8c04-afe7bf83d5b5
          - template: plan
            neon_project: late-pine-39936033
            netlify_site: 9d0d7a73-385d-4da1-ba10-1581ffc4d413
          - template: slides
            neon_project: hidden-thunder-16834477
            netlify_site: fd5deb5b-5539-47e1-830c-e5fb5e105efd
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@4468d825d5a88ef4012f1705a82f02ec3072f776 # v3
        with:
          project_id: ${{ matrix.neon_project }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Remove preview DB URL overrides
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          PR="${{ github.event.number }}"
          SITE="${{ matrix.netlify_site }}"
          ACCT="${{ secrets.NETLIFY_ACCOUNT_ID }}"
          AUTH="Authorization: Bearer $NETLIFY_AUTH_TOKEN"

          # Success is an explicit 2xx or a 404 (already gone). Everything else,
          # including curl's 000 transport-failure code, fails the step.
          delete_netlify_env() {
            local key="$1"
            local http
            http=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "$AUTH" \
              "https://api.netlify.com/api/v1/accounts/$ACCT/env/$key?site_id=$SITE")
            if [[ ! "$http" =~ ^(2[0-9][0-9]|404)$ ]]; then
              echo "::error::Failed to delete Netlify env $key for site $SITE (HTTP $http)"
              exit 1
            fi
          }

          delete_netlify_env "NETLIFY_DATABASE_URL_PR_${PR}"
          delete_netlify_env "NETLIFY_DATABASE_URL_UNPOOLED_PR_${PR}"
