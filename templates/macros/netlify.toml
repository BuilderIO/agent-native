[build]
  command = "export DATABASE_URL=${NETLIFY_DATABASE_URL:-$DATABASE_URL} && pnpm install && pnpm --filter macros exec drizzle-kit push --force && NITRO_PRESET=netlify pnpm --filter macros build"
  publish = "templates/macros/dist"
  functions = "templates/macros/.netlify/functions-internal"

[build.environment]
  NITRO_PRESET = "netlify"
  NPM_CONFIG_PRODUCTION = "false"
