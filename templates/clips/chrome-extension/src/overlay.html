<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Must be "normal": a dark color-scheme makes Chrome paint the iframe's
         canvas an OPAQUE dark color (ignoring the transparent body), which shows
         as a gray square around the round bubble. This meta overrides the CSS,
         so it has to be normal too. -->
    <meta name="color-scheme" content="normal" />
    <title>Clips overlay</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./overlay.ts"></script>
  </body>
</html>
