<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Record with Clips</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="popup-page">
    <main class="recorder-card">
      <header class="popup-header">
        <div class="popup-title">
          <span class="title-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M15 10.5L20 7.5V16.5L15 13.5V10.5Z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <rect
                x="4"
                y="6.5"
                width="11"
                height="11"
                rx="2.4"
                stroke="currentColor"
                stroke-width="1.8"
              />
            </svg>
          </span>
          <span>Clips recorder</span>
        </div>
        <button id="open-options" class="ghost-link" type="button">
          Settings
        </button>
      </header>

      <div id="idle-content">
        <section
          class="mode-grid"
          role="radiogroup"
          aria-label="Recording mode"
        >
          <button
            class="mode-option"
            type="button"
            role="radio"
            aria-checked="true"
            data-mode="screen-camera"
          >
            <span class="mode-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <rect
                  x="4"
                  y="5"
                  width="16"
                  height="11"
                  rx="2"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
                <path
                  d="M9 20H15M12 16V20"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="mode-title">Screen + cam</span>
          </button>
          <button
            class="mode-option"
            type="button"
            role="radio"
            aria-checked="false"
            data-mode="screen"
          >
            <span class="mode-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <rect
                  x="3.75"
                  y="5"
                  width="16.5"
                  height="12"
                  rx="2"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
                <path
                  d="M8 20H16"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="mode-title">Screen only</span>
          </button>
          <button
            class="mode-option"
            type="button"
            role="radio"
            aria-checked="false"
            data-mode="camera"
          >
            <span class="mode-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M15 10.5L20 7.5V16.5L15 13.5V10.5Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <rect
                  x="4"
                  y="6.5"
                  width="11"
                  height="11"
                  rx="2.4"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
              </svg>
            </span>
            <span class="mode-title">Camera only</span>
          </button>
        </section>

        <section class="settings-stack" aria-label="Recorder setup">
          <div class="setup-row target-row" aria-live="polite">
            <span class="row-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M10 6.5H7.25A2.25 2.25 0 0 0 5 8.75V16.75A2.25 2.25 0 0 0 7.25 19H15.25A2.25 2.25 0 0 0 17.5 16.75V14"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
                <path
                  d="M13.5 5H19V10.5"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M19 5L11 13"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <div class="row-copy">
              <div class="row-title" id="target-title">Current tab</div>
              <div class="row-subtitle" id="target-url">Loading tab</div>
            </div>
          </div>

          <div id="source-section" class="setup-panel">
            <div class="panel-heading">
              <span class="row-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <rect
                    x="4"
                    y="5"
                    width="16"
                    height="11"
                    rx="2"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                  <path
                    d="M9 20H15M12 16V20"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
              </span>
              <div class="row-copy">
                <div class="row-title">Capture source</div>
                <div id="source-summary" class="row-subtitle">
                  Browser tab selected
                </div>
              </div>
            </div>
            <div
              class="source-grid"
              role="radiogroup"
              aria-label="Capture source"
            >
              <button
                class="source-option"
                type="button"
                role="radio"
                aria-checked="true"
                data-surface="browser"
              >
                <span>Browser tab</span>
                <small>Choose an open tab</small>
              </button>
              <button
                class="source-option"
                type="button"
                role="radio"
                aria-checked="false"
                data-surface="window"
              >
                <span>Window</span>
                <small>One app or browser</small>
              </button>
              <button
                class="source-option"
                type="button"
                role="radio"
                aria-checked="false"
                data-surface="monitor"
              >
                <span>Screen</span>
                <small>Capture everything</small>
              </button>
            </div>
          </div>

          <label class="setup-row toggle-row" for="include-microphone">
            <span class="row-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M12 4.5A3.5 3.5 0 0 0 8.5 8V11A3.5 3.5 0 0 0 15.5 11V8A3.5 3.5 0 0 0 12 4.5Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
                <path
                  d="M6.5 10.5V11A5.5 5.5 0 0 0 17.5 11V10.5"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
                <path
                  d="M12 16.5V20M9 20H15"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="row-copy">
              <span class="row-title">Microphone</span>
              <span class="row-subtitle"
                >Record voiceover with tab audio when available.</span
              >
            </span>
            <input id="include-microphone" type="checkbox" role="switch" />
          </label>

          <label class="setup-row toggle-row" for="include-developer-logs">
            <span class="row-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M8 9L5 12L8 15"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M16 9L19 12L16 15"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M13.5 7L10.5 17"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="row-copy">
              <span class="row-title">Developer logs</span>
              <span class="row-subtitle"
                >Console and network diagnostics. Redacted before saving.</span
              >
            </span>
            <input id="include-developer-logs" type="checkbox" role="switch" />
          </label>
        </section>
      </div>

      <footer class="action-area">
        <div id="active-content" class="active-content" hidden>
          <div class="recording-dot" aria-hidden="true"></div>
          <div class="row-copy">
            <div id="recording-title" class="row-title">Current recording</div>
            <div id="recording-url" class="row-subtitle"></div>
            <div id="recording-status" class="status">Recording 0:00</div>
          </div>
          <button
            id="open-recording"
            class="icon-button"
            type="button"
            title="Open clip"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M14 5H19V10"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M19 5L11 13"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M10 7H7.75A2.75 2.75 0 0 0 5 9.75V16.25A2.75 2.75 0 0 0 7.75 19H14.25A2.75 2.75 0 0 0 17 16.25V14"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
        <p class="hint">
          Current tab starts immediately. Window and screen use the Clips
          picker.
        </p>
        <button id="start" class="primary-action" type="button">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle
              cx="12"
              cy="12"
              r="6"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <circle cx="12" cy="12" r="3" fill="currentColor" />
          </svg>
          Start recording
        </button>
        <button id="sign-in" class="primary-action" type="button" hidden>
          Sign in to Clips
        </button>
        <div class="recording-actions">
          <button id="discard" class="secondary-action" type="button">
            Discard
          </button>
          <button id="stop" class="primary-action" type="button">
            Stop and save
          </button>
        </div>
        <span
          id="status"
          class="status"
          role="status"
          aria-live="polite"
        ></span>
      </footer>
    </main>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
