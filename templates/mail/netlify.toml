[build]
ignore = "node ./scripts/netlify-ignore-build.mjs mail"
command = "_p=NETLIFY_DATABASE_URL_PR_${REVIEW_ID:-0} && _pu=NETLIFY_DATABASE_URL_UNPOOLED_PR_${REVIEW_ID:-0} && if [ -n \"${REVIEW_ID:-}\" ] && { [ -z \"${!_p:-}\" ] || [ -z \"${!_pu:-}\" ]; }; then echo \"Preview DB vars for PR $REVIEW_ID not provisioned yet — failing closed to avoid a shared/production database\"; exit 1; fi && export DATABASE_URL=${!_p:-${NETLIFY_DATABASE_URL:-$DATABASE_URL}} && pnpm install && DATABASE_URL=${!_pu:-${NETLIFY_DATABASE_URL_UNPOOLED:-$DATABASE_URL}} NITRO_PRESET=netlify pnpm --filter mail build"
publish = "templates/mail/dist"
functions = "templates/mail/.netlify/functions-internal"

[build.environment]
GA_MEASUREMENT_ID = "G-ESF7FYXGN9"
NITRO_PRESET = "netlify"
NPM_CONFIG_PRODUCTION = "false"

# A2A delegation calls run a full agent loop (LLM + tool calls + DB queries).
# The framework does not impose a default agent-run timeout; if a template sets
# AGENT_RUN_SOFT_TIMEOUT_MS, keep it below this function timeout so the hidden
# auto-continuation path can hand off before Netlify kills the function.
[functions."*"]
timeout = 75
