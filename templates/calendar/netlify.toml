[build]
  command = "export DATABASE_URL=${NETLIFY_DATABASE_URL:-$DATABASE_URL} && pnpm install && pnpm --filter calendar exec drizzle-kit push --force && NITRO_PRESET=netlify pnpm --filter calendar build"
  publish = "templates/calendar/dist"
  functions = "templates/calendar/.netlify/functions-internal"

[build.environment]
  NITRO_PRESET = "netlify"
