[build]
  ignore = "node ./scripts/netlify-ignore-build.mjs forms"
  command = "export DATABASE_URL=${NETLIFY_DATABASE_URL:-$DATABASE_URL} && pnpm install && NITRO_PRESET=netlify pnpm --filter forms build"
  publish = "templates/forms/dist"
  functions = "templates/forms/.netlify/functions-internal"

[build.environment]
  NITRO_PRESET = "netlify"
  NPM_CONFIG_PRODUCTION = "false"

# A2A delegation calls run a full agent loop (LLM + tool calls + DB queries).
# Aligned with the agent-run soft timeout in
# packages/core/src/agent/run-manager.ts (hosted default = 75_000)
# so the framework's friendly "run_timeout" event fires before Netlify kills
# the function.
[functions."*"]
  timeout = 75
