[build]
  command = "export DATABASE_URL=${NETLIFY_DATABASE_URL:-$DATABASE_URL} && pnpm install && pnpm --filter videos exec drizzle-kit push --force && NITRO_PRESET=netlify pnpm --filter videos build"
  publish = "templates/videos/dist"
  functions = "templates/videos/.netlify/functions-internal"

[build.environment]
  NITRO_PRESET = "netlify"
  NPM_CONFIG_PRODUCTION = "false"
