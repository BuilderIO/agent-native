[build]
  command = "export DATABASE_URL=${NETLIFY_DATABASE_URL:-$DATABASE_URL} && pnpm install && DATABASE_URL=${NETLIFY_DATABASE_URL_UNPOOLED:-$DATABASE_URL} NITRO_PRESET=netlify pnpm --filter videos build"
  publish = "templates/videos/dist"
  functions = "templates/videos/.netlify/functions-internal"

[build.environment]
  NITRO_PRESET = "netlify"
  NPM_CONFIG_PRODUCTION = "false"

# Allow A2A delegation calls (LLM + tool calls) past the default 10s.
[functions]
  node_bundler = "esbuild"
  timeout = 26
