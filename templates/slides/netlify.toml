[build]
  command = "export DATABASE_URL=${NETLIFY_DATABASE_URL:-$DATABASE_URL} && pnpm install && pnpm --filter slides exec drizzle-kit push --force && NITRO_PRESET=netlify pnpm --filter slides build"
  publish = "templates/slides/dist"
  functions = "templates/slides/.netlify/functions-internal"

[build.environment]
  NITRO_PRESET = "netlify"
  NPM_CONFIG_PRODUCTION = "false"
