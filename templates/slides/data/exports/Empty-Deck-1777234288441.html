<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Empty Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #111;
        overflow: hidden;
        font-family: "Poppins", sans-serif;
      }

      .viewport {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .slide-container {
        width: 960px;
        height: 540px;
        position: relative;
        transform-origin: center center;
      }

      .slide {
        width: 960px;
        height: 540px;
        background: #000;
        overflow: hidden;
        position: absolute;
        top: 0;
        left: 0;
        align-items: stretch;
        justify-content: stretch;
      }

      .slide > * {
        width: 100%;
        height: 100%;
      }

      .fmd-slide {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
      }

      .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 40px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        font-family: "Poppins", sans-serif;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        z-index: 100;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .viewport:hover .bottom-bar,
      .bottom-bar:hover {
        opacity: 1;
      }

      .slide-counter {
        font-variant-numeric: tabular-nums;
      }

      .controls {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .controls span {
        opacity: 0.6;
      }

      kbd {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        padding: 1px 5px;
        font-size: 11px;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div class="viewport" id="viewport">
      <div class="slide-container" id="slideContainer"></div>
      <div class="bottom-bar">
        <div class="slide-counter" id="counter">1 / 0</div>
        <div class="controls">
          <span><kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate</span>
          <span><kbd>F</kbd> fullscreen</span>
          <span><kbd>Esc</kbd> exit</span>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var currentSlide = 0;
        var totalSlides = 0;
        var slides = document.querySelectorAll(".slide");
        var counter = document.getElementById("counter");
        var container = document.getElementById("slideContainer");

        function showSlide(index) {
          if (index < 0 || index >= totalSlides) return;
          slides[currentSlide].style.display = "none";
          currentSlide = index;
          slides[currentSlide].style.display = "flex";
          counter.textContent = currentSlide + 1 + " / " + totalSlides;
        }

        function fitSlide() {
          var vw = window.innerWidth;
          var vh = window.innerHeight;
          var scale = Math.min(vw / 960, vh / 540);
          container.style.transform = "scale(" + scale + ")";
        }

        window.addEventListener("resize", fitSlide);
        fitSlide();

        document.addEventListener("keydown", function (e) {
          switch (e.key) {
            case "ArrowRight":
            case "ArrowDown":
            case " ":
              e.preventDefault();
              showSlide(currentSlide + 1);
              break;
            case "ArrowLeft":
            case "ArrowUp":
              e.preventDefault();
              showSlide(currentSlide - 1);
              break;
            case "Home":
              e.preventDefault();
              showSlide(0);
              break;
            case "End":
              e.preventDefault();
              showSlide(totalSlides - 1);
              break;
            case "f":
            case "F":
              if (!document.fullscreenElement) {
                document.documentElement
                  .requestFullscreen()
                  .catch(function () {});
              } else {
                document.exitFullscreen().catch(function () {});
              }
              break;
            case "Escape":
              if (document.fullscreenElement) {
                document.exitFullscreen().catch(function () {});
              }
              break;
          }
        });

        // Click to advance (left third = back, right two-thirds = forward)
        document
          .getElementById("viewport")
          .addEventListener("click", function (e) {
            if (e.target.closest(".bottom-bar")) return;
            var rect = this.getBoundingClientRect();
            var x = e.clientX - rect.left;
            if (x < rect.width / 3) {
              showSlide(currentSlide - 1);
            } else {
              showSlide(currentSlide + 1);
            }
          });
      })();
    </script>
  </body>
</html>
