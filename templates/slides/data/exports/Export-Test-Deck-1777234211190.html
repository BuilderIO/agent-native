<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Export Test Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #111;
        overflow: hidden;
        font-family: "Poppins", sans-serif;
      }

      .viewport {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .slide-container {
        width: 960px;
        height: 540px;
        position: relative;
        transform-origin: center center;
      }

      .slide {
        width: 960px;
        height: 540px;
        background: #000;
        overflow: hidden;
        position: absolute;
        top: 0;
        left: 0;
        align-items: stretch;
        justify-content: stretch;
      }

      .slide > * {
        width: 100%;
        height: 100%;
      }

      .fmd-slide {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
      }

      .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 40px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        font-family: "Poppins", sans-serif;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        z-index: 100;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .viewport:hover .bottom-bar,
      .bottom-bar:hover {
        opacity: 1;
      }

      .slide-counter {
        font-variant-numeric: tabular-nums;
      }

      .controls {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .controls span {
        opacity: 0.6;
      }

      kbd {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        padding: 1px 5px;
        font-size: 11px;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div class="viewport" id="viewport">
      <div class="slide-container" id="slideContainer">
        <section class="slide" data-index="0" style="display: flex">
          <div
            class="fmd-slide"
            style="
              padding: 80px 110px;
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: flex-start;
              font-family: Poppins, sans-serif;
            "
          >
            <div
              style="
                font-size: 16px;
                font-weight: 700;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: #00e5ff;
                margin-bottom: 24px;
              "
            >
              2026
            </div>
            <h1
              style="
                font-size: 64px;
                font-weight: 900;
                color: #fff;
                line-height: 1.1;
                letter-spacing: -2px;
                margin: 0 0 24px 0;
              "
            >
              Export Test
            </h1>
            <p
              style="
                font-size: 22px;
                color: rgba(255, 255, 255, 0.55);
                margin: 0;
              "
            >
              Testing all export formats
            </p>
          </div>
        </section>
        <section class="slide" data-index="1" style="display: none">
          <div
            class="fmd-slide"
            style="
              padding: 80px 110px;
              display: flex;
              flex-direction: column;
              justify-content: flex-start;
              font-family: Poppins, sans-serif;
            "
          >
            <div
              style="
                font-size: 14px;
                font-weight: 700;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: #00e5ff;
                margin-bottom: 16px;
              "
            >
              OVERVIEW
            </div>
            <h2
              style="
                font-size: 40px;
                font-weight: 900;
                color: #fff;
                line-height: 1.15;
                letter-spacing: -1px;
                margin: 0 0 48px 0;
              "
            >
              Key Points
            </h2>
            <div style="display: flex; flex-direction: column; gap: 20px">
              <div style="display: flex; align-items: flex-start; gap: 16px">
                <span
                  style="
                    font-size: 8px;
                    color: #fff;
                    margin-top: 8px;
                    flex-shrink: 0;
                  "
                  >&#x25CF;</span
                ><span
                  style="
                    font-size: 22px;
                    color: rgba(255, 255, 255, 0.85);
                    line-height: 1.5;
                  "
                  >First bullet point with some text</span
                >
              </div>
              <div style="display: flex; align-items: flex-start; gap: 16px">
                <span
                  style="
                    font-size: 8px;
                    color: #fff;
                    margin-top: 8px;
                    flex-shrink: 0;
                  "
                  >&#x25CF;</span
                ><span
                  style="
                    font-size: 22px;
                    color: rgba(255, 255, 255, 0.85);
                    line-height: 1.5;
                  "
                  >Second bullet point here</span
                >
              </div>
            </div>
          </div>
        </section>
        <section class="slide" data-index="2" style="display: none">
          <div
            class="fmd-slide"
            style="
              padding: 80px 110px;
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: flex-start;
              font-family: Poppins, sans-serif;
            "
          >
            <div
              style="
                font-size: 16px;
                font-weight: 700;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: #00e5ff;
                margin-bottom: 24px;
              "
            >
              THANK YOU
            </div>
            <h2
              style="
                font-size: 64px;
                font-weight: 900;
                color: #fff;
                line-height: 1.1;
                letter-spacing: -2px;
                margin: 0;
              "
            >
              Questions?
            </h2>
          </div>
        </section>
      </div>
      <div class="bottom-bar">
        <div class="slide-counter" id="counter">1 / 3</div>
        <div class="controls">
          <span><kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate</span>
          <span><kbd>F</kbd> fullscreen</span>
          <span><kbd>Esc</kbd> exit</span>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var currentSlide = 0;
        var totalSlides = 3;
        var slides = document.querySelectorAll(".slide");
        var counter = document.getElementById("counter");
        var container = document.getElementById("slideContainer");

        function showSlide(index) {
          if (index < 0 || index >= totalSlides) return;
          slides[currentSlide].style.display = "none";
          currentSlide = index;
          slides[currentSlide].style.display = "flex";
          counter.textContent = currentSlide + 1 + " / " + totalSlides;
        }

        function fitSlide() {
          var vw = window.innerWidth;
          var vh = window.innerHeight;
          var scale = Math.min(vw / 960, vh / 540);
          container.style.transform = "scale(" + scale + ")";
        }

        window.addEventListener("resize", fitSlide);
        fitSlide();

        document.addEventListener("keydown", function (e) {
          switch (e.key) {
            case "ArrowRight":
            case "ArrowDown":
            case " ":
              e.preventDefault();
              showSlide(currentSlide + 1);
              break;
            case "ArrowLeft":
            case "ArrowUp":
              e.preventDefault();
              showSlide(currentSlide - 1);
              break;
            case "Home":
              e.preventDefault();
              showSlide(0);
              break;
            case "End":
              e.preventDefault();
              showSlide(totalSlides - 1);
              break;
            case "f":
            case "F":
              if (!document.fullscreenElement) {
                document.documentElement
                  .requestFullscreen()
                  .catch(function () {});
              } else {
                document.exitFullscreen().catch(function () {});
              }
              break;
            case "Escape":
              if (document.fullscreenElement) {
                document.exitFullscreen().catch(function () {});
              }
              break;
          }
        });

        // Click to advance (left third = back, right two-thirds = forward)
        document
          .getElementById("viewport")
          .addEventListener("click", function (e) {
            if (e.target.closest(".bottom-bar")) return;
            var rect = this.getBoundingClientRect();
            var x = e.clientX - rect.left;
            if (x < rect.width / 3) {
              showSlide(currentSlide - 1);
            } else {
              showSlide(currentSlide + 1);
            }
          });
      })();
    </script>
  </body>
</html>
