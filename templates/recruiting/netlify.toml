[build]
  command = "export DATABASE_URL=${NETLIFY_DATABASE_URL:-$DATABASE_URL} && pnpm install && pnpm --filter recruiting exec drizzle-kit push --force && NITRO_PRESET=netlify pnpm --filter recruiting build"
  publish = "templates/recruiting/dist"
  functions = "templates/recruiting/.netlify/functions-internal"

[build.environment]
  NITRO_PRESET = "netlify"
  NPM_CONFIG_PRODUCTION = "false"
