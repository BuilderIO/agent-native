[build]
  command = "export DATABASE_URL=${NETLIFY_DATABASE_URL:-$DATABASE_URL} && pnpm install && pnpm --filter content exec drizzle-kit push --force && NITRO_PRESET=netlify pnpm --filter content build"
  publish = "templates/content/dist"
  functions = "templates/content/.netlify/functions-internal"

[build.environment]
  NITRO_PRESET = "netlify"
  NPM_CONFIG_PRODUCTION = "false"
