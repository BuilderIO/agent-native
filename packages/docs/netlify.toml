[build]
  command = "pnpm install && NITRO_PRESET=netlify pnpm --filter @agent-native/docs build"
  publish = "packages/docs/dist"
  functions = "packages/docs/.netlify/functions-internal"

# Framework runtime routes must hit the Nitro server function. Without this,
# the public docs pages can deploy while the agent sidebar/session/sync routes
# fall through to Netlify's static 404 handler.
[[redirects]]
  from = "/_agent-native/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/.well-known/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

# Slug redirects for renamed docs — keep in sync with SLUG_REDIRECTS in app/routes/docs.$slug.tsx.
[[redirects]]
  from = "/docs/resources"
  to = "/docs/workspace"
  status = 301
  force = true

[build.environment]
  NITRO_PRESET = "netlify"

# SSR pages: keep browsers fresh, let the CDN serve stale while revalidating.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=5, stale-while-revalidate=604800, stale-if-error=3600"

# Static assets: immutable long cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Agent-native API routes: no caching
[[headers]]
  for = "/_agent-native/*"
  [headers.values]
    Cache-Control = "no-cache, no-store"
