appId: com.agentnative.desktop
productName: Agent Native

directories:
  buildResources: build
  output: dist

files:
  - out/**
  - "!node_modules/**"
  - "!src/**"
  - "!shared/**"
  - "!electron.vite.config.*"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.*.json}"

protocols:
  name: Agent Native
  schemes:
    - agentnative

mac:
  category: public.app-category.developer-tools
  identity: "Builder.io, Inc (W3PMF2T3MW)"
  notarize: true
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal

dmg:
  artifactName: ${productName}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${arch}.${ext}

nsis:
  oneClick: true
  perMachine: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Development
  artifactName: ${productName}-${arch}.${ext}

publish:
  provider: github
  owner: BuilderIO
  repo: agent-native

npmRebuild: false
