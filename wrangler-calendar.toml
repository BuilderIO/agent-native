name = "agent-native-calendar"
main = "templates/calendar/dist/_worker.js/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat_v2"]

# Smart Placement: run the Worker near the D1 database to reduce latency
[placement]
mode = "smart"

[vars]
GA_MEASUREMENT_ID = "G-ESF7FYXGN9"

[assets]
directory = "templates/calendar/dist"

[[d1_databases]]
binding = "DB"
database_name = "agent-native-calendar"
database_id = "26d5afaf-e324-40dc-b963-9417e26ee70c"
