name = "agent-native-slides"
main = "templates/slides/dist/_worker.js/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat_v2"]

# Smart Placement: run the Worker near the D1 database to reduce latency
[placement]
mode = "smart"

[vars]
GA_MEASUREMENT_ID = "G-ESF7FYXGN9"

[assets]
directory = "templates/slides/dist"

# Stub native modules that can't run on Workers
[alias]
"better-sqlite3" = "./templates/slides/dist/_worker.js/stubs/empty.js"
"node-pty" = "./templates/slides/dist/_worker.js/stubs/empty.js"
"chokidar" = "./templates/slides/dist/_worker.js/stubs/empty.js"
"fsevents" = "./templates/slides/dist/_worker.js/stubs/empty.js"

[[d1_databases]]
binding = "DB"
database_name = "agent-native-slides"
database_id = "dfa8936b-2ecd-460e-a6ac-2088cf12d701"
